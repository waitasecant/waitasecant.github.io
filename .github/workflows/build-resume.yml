name: Build Resume

on:
  push:
    branches:
      - main
    paths:
      - '*.tex'
      - '.github/workflows/build-resume.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: himanshu-resume.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: himanshu-resume.pdf
